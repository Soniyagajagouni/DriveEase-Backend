server.port=${PORT:4000}
spring.application.name=DriveEase

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Optional for now if file uploads are not needed immediately on Render
# disk.upload.basepath=${DISK_UPLOAD_BASEPATH}

spring.mail.protocol=smtp
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.starttls.enable=true

Razorpay.key_id=${RAZORPAY_KEY_ID}
Razorpay.key_secret=${RAZORPAY_KEY_SECRET}
